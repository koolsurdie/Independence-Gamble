<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Independence Gamble</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #1e3a8a;
            font-size: 2.2rem;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #64748b;
            text-align: center;
            margin-bottom: 35px;
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #1e3a8a;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #3b82f6;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: #2563eb;
        }

        button:active {
            transform: scale(0.98);
        }

        .error {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
        }

        .error.show {
            display: flex;
        }

        .error::before {
            content: "✕";
            font-weight: bold;
            font-size: 1.2rem;
        }

        .success {
            background: #dcfce7;
            color: #166534;
            padding: 16px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
            font-size: 0.95rem;
        }

        .success.show {
            display: block;
        }

        .success::before {
            content: "✓ ";
            font-weight: bold;
        }

        .urls-section {
            background: #f0f9ff;
            padding: 16px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
            border-left: 4px solid #3b82f6;
        }

        .urls-section.show {
            display: block;
        }

        .urls-section h3 {
            color: #1e3a8a;
            font-size: 0.95rem;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .url-box {
            background: white;
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            word-break: break-all;
            color: #0c4a6e;
            border: 1px solid #bae6fd;
        }

        .url-box:last-child {
            margin-bottom: 0;
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid #e2e8f0;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Create New Session</h1>
        <p class="subtitle">Set up your Independence Gamble session</p>

        <div class="form-group">
            <label for="teamA">Team A Name</label>
            <input type="text" id="teamA" placeholder="e.g., Strategy Team" />
        </div>

        <div class="form-group">
            <label for="teamB">Team B Name</label>
            <input type="text" id="teamB" placeholder="e.g., Operations Team" />
        </div>

        <button id="createBtn" onclick="createSession()">✓ Create Session</button>

        <div class="loader" id="loader"></div>
        <div class="error" id="errorBox"></div>
        <div class="success" id="successBox"></div>

        <div class="urls-section" id="urlsSection">
            <h3>Session URLs (copy and share with teams):</h3>
            <div id="urlsContainer"></div>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwqGu0D1nbc1xAXFPPle5I-DmoDF5MuQqAhUilgEqoF74lt1_QvgqgSr0eZdXJipb2N/exec';
        const BASE_URL = window.location.origin + window.location.pathname;

        function generateSessionId() {
            return 'SES-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9).toUpperCase();
        }

        function showError(message) {
            const box = document.getElementById('errorBox');
            box.textContent = message;
            box.classList.add('show');
            document.getElementById('loader').style.display = 'none';
            document.getElementById('createBtn').disabled = false;
        }

        function showSuccess(message) {
            const box = document.getElementById('successBox');
            box.textContent = message;
            box.classList.add('show');
        }

        async function createSession() {
            const teamA = document.getElementById('teamA').value.trim();
            const teamB = document.getElementById('teamB').value.trim();

            if (!teamA || !teamB) {
                showError('Please enter both team names');
                return;
            }

            document.getElementById('errorBox').classList.remove('show');
            document.getElementById('successBox').classList.remove('show');
            document.getElementById('loader').style.display = 'block';
            document.getElementById('createBtn').disabled = true;

            const sessionId = generateSessionId();
            const trainerEmail = 'orangebusinesscampus@gmail.com';

            try {
                const url = `${APPS_SCRIPT_URL}?action=create_session&sessionId=${encodeURIComponent(sessionId)}&teamAName=${encodeURIComponent(teamA)}&teamBName=${encodeURIComponent(teamB)}&trainerEmail=${encodeURIComponent(trainerEmail)}`;

                const response = await fetch(url);
                const data = await response.json();

                if (data.success) {
                    showSuccess('Session created successfully!');

                    const teamAUrl = `${BASE_URL}?session=${sessionId}&team=A`;
                    const teamBUrl = `${BASE_URL}?session=${sessionId}&team=B`;
                    const trainerUrl = `${BASE_URL}?session=${sessionId}&role=trainer`;

                    const urlsContainer = document.getElementById('urlsContainer');
                    urlsContainer.innerHTML = `
                        <div class="url-box"><strong>Team A (${teamA}):</strong><br>${teamAUrl}</div>
                        <div class="url-box"><strong>Team B (${teamB}):</strong><br>${teamBUrl}</div>
                        <div class="url-box"><strong>Trainer Dashboard:</strong><br>${trainerUrl}</div>
                    `;
                    document.getElementById('urlsSection').classList.add('show');
                    document.getElementById('loader').style.display = 'none';
                } else {
                    showError('Failed to create session: ' + data.data);
                }
            } catch (error) {
                showError('Network error: ' + error.message);
            }
        }

        // Allow Enter key
        document.getElementById('teamB').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') createSession();
        });
    </script>
</body>
</html>
